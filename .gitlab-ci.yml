stages:
  - test
  - build
  - publish

variables:
  NODE_VERSION: "24"
  CG3_DOCKER_RUNNER_TAG: "cg3-docker"

default:
  image: "node:${NODE_VERSION}"
  interruptible: true
  tags:
    - $CG3_DOCKER_RUNNER_TAG
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - .npm/

test_package:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'

build_package:
  stage: build
  needs:
    - job: test_package
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm pack --dry-run
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'

publish_npm:
  stage: publish
  needs:
    - job: build_package
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - npm install -g npm@latest
    - |
      set -euo pipefail
      package_version="$(node -p "require('./package.json').version")"
      tag_version="${CI_COMMIT_TAG#v}"

      if [[ "$package_version" != "$tag_version" ]]; then
        echo "package.json version ($package_version) does not match tag ($tag_version)" >&2
        exit 1
      fi

      npm ci --cache .npm --prefer-offline
      npm test
      npm run build
      npm pack --dry-run

      if [[ -n "${NPM_TOKEN:-}" ]]; then
        npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
      fi

      npm publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+([-.].*)?$/'
