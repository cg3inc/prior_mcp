stages:
  - test
  - build

variables:
  NODE_VERSION: "24"
  CG3_DOCKER_RUNNER_TAG: "cg3-docker"

default:
  image: "node:${NODE_VERSION}"
  interruptible: true
  tags:
    - $CG3_DOCKER_RUNNER_TAG
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - .npm/

test_package:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'

build_package:
  stage: build
  needs:
    - job: test_package
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - npm pack --dry-run
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'

# npm publishing for this public package moved to GitHub Actions in the
# canonical GitHub repo. Keep GitLab CI focused on verification for the
# internal mirror to avoid duplicate publishes and split provenance.
